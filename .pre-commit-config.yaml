repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: >
          bash -c '
          set -euo pipefail;
          cargo fmt --all
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true

      - id: clippy
        name: clippy
        entry: >
          bash -c '
          set -euo pipefail;
          export CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS:-6}";
          export RUSTFLAGS="-D warnings -W clippy::pedantic -W clippy::nursery";
          cargo hack clippy --fix --allow-dirty
          --feature-powerset --depth 2
          --at-least-one-of rumqttc-v4,rumqttc-v5
          --mutually-exclusive-features rumqttc-v4,rumqttc-v5
          --no-dev-deps
          -p mqtt-typed-client-next
          -p mqtt-typed-client-core-next
          -p mqtt-typed-client-macros-next
          -p mqtt-topic-engine-next
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true

      - id: clippy-workspace
        name: clippy workspace
        entry: >
          bash -c '
          set -euo pipefail;
          cargo clippy --workspace --all-targets -- \
            -D clippy::dbg_macro \
            -D clippy::todo \
            -D clippy::exit \
            -D clippy::clone_on_ref_ptr \
            -D clippy::empty_drop \
            -D clippy::let_underscore_must_use \
            -D clippy::unused_result_ok \
            -D clippy::undocumented_unsafe_blocks \
            -D clippy::unwrap_in_result \
            -D clippy::panic_in_result_fn \
            -D clippy::rest_pat_in_fully_bound_structs \
            -D clippy::string_slice \
            -D clippy::host_endian_bytes \
            -D clippy::little_endian_bytes \
            -D clippy::mixed_read_write_in_expression \
            -D clippy::suspicious_xor_used_as_pow \
            -D clippy::fn_to_numeric_cast_any \
            -D clippy::await_holding_lock \
            -D clippy::await_holding_refcell_ref \
            -D clippy::future_not_send \
            -D clippy::large_futures \
            -D clippy::large_stack_frames \
            -D clippy::large_enum_variant \
            -D clippy::mutex_atomic \
            -D clippy::rc_mutex \
            -D clippy::multiple_crate_versions
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true

      - id: tests
        name: tests
        entry: >
          bash -c '
          set -euo pipefail;
          export CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS:-6}";
          cargo hack
          --feature-powerset --depth 2
          --at-least-one-of rumqttc-v4,rumqttc-v5
          --mutually-exclusive-features rumqttc-v4,rumqttc-v5
          test
          -p mqtt-typed-client-next
          -p mqtt-typed-client-core-next
          -p mqtt-typed-client-macros-next
          -p mqtt-topic-engine-next
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true

      - id: combo-tests
        name: combo tests
        entry: >
          bash -c '
          set -euo pipefail;
          export CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS:-6}";

          cargo test -p mqtt-typed-client-next --no-default-features --features "rumqttc-v4,rumqttc-websocket,rumqttc-use-rustls";
          cargo test -p mqtt-typed-client-next --no-default-features --features "rumqttc-v5,rumqttc-websocket,rumqttc-use-rustls";
          cargo test -p mqtt-typed-client-next --no-default-features --features "rumqttc-v4,rumqttc-websocket,rumqttc-use-rustls-no-provider";
          cargo test -p mqtt-typed-client-next --no-default-features --features "rumqttc-v5,rumqttc-websocket,rumqttc-use-rustls-no-provider";
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true

      - id: rustls-conflict-guard
        name: rustls conflict guard
        entry: >
          bash -c '
          set -euo pipefail;
          export CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS:-6}";

          if cargo check -p mqtt-typed-client-next --no-default-features --features "rumqttc-v4,rumqttc-use-rustls,rumqttc-use-rustls-no-provider" 2>/dev/null; then
            echo "ERROR - mqtt-typed-client-next rustls provider conflict guard failed";
            exit 1;
          fi;

          if cargo check -p mqtt-typed-client-next --no-default-features --features "rumqttc-v5,rumqttc-use-rustls,rumqttc-use-rustls-no-provider" 2>/dev/null; then
            echo "ERROR - mqtt-typed-client-next rustls provider conflict guard failed";
            exit 1;
          fi;
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true
